name: GenX API
description: Run contract driven client and package generation in GitHub workflows using the GenX API CLI
branding:
  icon: package
  color: blue

inputs:
  config-path:
    description: Local path to the GenX API config file.
    required: false
  contract-path:
    description: Local path or remote http/https URL to the OpenAPI or Swagger contract.
    required: false
  output-path:
    description: Output directory for generated files or packages.
    required: false
  publish-mode:
    description: Publish mode passed through to the GenX API CLI. Common values include none, npm, github-packages, yarn, and pnpm.
    required: false
    default: none
  dry-run:
    description: When true, request validation and planning without a full publish flow.
    required: false
    default: "false"
  working-directory:
    description: Directory where the GenX API CLI should run. Resolved relative to GITHUB_WORKSPACE.
    required: false
    default: .
  extra-args:
    description: Additional CLI arguments as a JSON array string or newline-delimited list.
    required: false
  npm-token:
    description: npm token forwarded to the CLI as NPM_TOKEN and NODE_AUTH_TOKEN when needed.
    required: false
  github-token:
    description: GitHub token forwarded to the CLI as GITHUB_TOKEN when needed.
    required: false

outputs:
  summary:
    description: Short execution summary.
  command:
    description: Sanitized command that the action executed.
  working-directory:
    description: Resolved working directory used for execution.
  manifest-path:
    description: Manifest path when the CLI reports one.
  release-manifest-path:
    description: Release manifest path when the CLI reports one.

runs:
  using: node24
  main: dist/index.js
