name: GenX API
description: Run contract driven client and package generation in GitHub workflows using the GenX API CLI
branding:
  icon: package
  color: blue

inputs:
  genxapi-version:
    description: Explicit GenX API CLI version to execute through npx.
    required: false
    default: 0.1.0
  config-path:
    description: Path to the GenX API config file passed to the CLI.
    required: false
  contract-path:
    description: Local path or remote URL for the OpenAPI or Swagger contract.
    required: false
  output-path:
    description: Output directory for generated files or publishable package artifacts.
    required: false
  publish-mode:
    description: Publish mode forwarded to the GenX API CLI. Supported wrapper values are none, npm, and github-packages.
    required: false
    default: none
  dry-run:
    description: When true, request validation and planning without full generation or publish.
    required: false
    default: "false"
  working-directory:
    description: Directory from which the GenX API CLI should run.
    required: false
    default: .
  extra-args:
    description: Extra CLI arguments as a JSON array string or newline-delimited list.
    required: false
  npm-token:
    description: npm token exposed only to the GenX API CLI for npm publish flows.
    required: false
  github-token:
    description: GitHub token exposed only to the GenX API CLI for GitHub-aware flows.
    required: false

outputs:
  resolved-contract-source:
    description: Resolved contract source reported by the GenX API CLI.
  template:
    description: Template identifier reported by the GenX API CLI.
  output-path:
    description: Output path resolved by the action or reported by the GenX API CLI.
  manifest-path:
    description: Manifest path reported by the GenX API CLI.
  published-package-name:
    description: Published package name reported by the GenX API CLI.
  published-package-version:
    description: Published package version reported by the GenX API CLI.
  release-manifest-path:
    description: Release manifest path reported by the GenX API CLI.
  summary:
    description: Human-readable execution summary.

runs:
  using: node24
  main: dist/index.js
